# Token-GRPO algorithm hyper-parameters — extends GRPO for AR (Janus, NextStep).
# Adds mask_key (which token positions to score) and kl_estimator (k1/k3).
defaults:
  - /base/algorithm/grpo

algorithm:
  kind: token_grpo
  mask_key: token_mask          # SignalBatch.aux key for [B, L] float mask
  kl_estimator: k3              # k1 = logp-logp_ref signed; k3 = Schulman 2020 unbiased
