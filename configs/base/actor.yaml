# Actor / training-loop config
actor:
  optim:
    lr: 1.0e-4
    adam_beta1: 0.9
    adam_beta2: 0.999
    weight_decay: 1.0e-4
    eps: 1.0e-8
    use_8bit_adam: false
    allow_tf32: true

  max_norm: 1.0
  ppo_epochs: 1
  bf16: true
  gradient_checkpointing: true

  # Train loss only on a subset of denoising timesteps (compute saving).
  # Diffusion-RL specific — LLM RL has no analog. Belongs in actor because
  # it controls which timesteps participate in the loss, not which steps
  # are sampled at rollout.
  timestep_fraction: 0.99

  ema:
    enable: true
    decay: 0.9
    update_interval: 8
