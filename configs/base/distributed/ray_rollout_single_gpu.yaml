# Single-GPU Ray rollout preset for local debug and smoke runs.
distributed:
  backend: ray
  rollout:
    num_workers: 1
    gpus_per_worker: 1.0
    cpus_per_worker: 4.0
    placement_strategy: STRICT_PACK
    allow_driver_gpu_overlap: true
    max_inflight_chunks_per_worker: 1
    sync_trainable_state: lora_only
