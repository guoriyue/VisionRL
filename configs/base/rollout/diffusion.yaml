# Rollout / sampling config for diffusion models
rollout:
  n: 4
  rollout_batch_size: 4
  timestep_fraction: 0.99       # subsample denoise timesteps for training
  cfg: true
  guidance_scale: 4.5

  # Subtract kl_reward * per_step_kl from reward before advantages.
  kl_reward: 0.0

  # Stochastic SDE sampling window (0 = SDE all steps; >0 = SDE only inside window).
  sde:
    window_size: 0
    window_range: [0, 10]

  same_latent: false            # share noise across group (debug only)
