# Rollout / sampling config for diffusion models — pure RL sampling knobs.
# Sampling shape (resolution / steps / guidance_scale / cfg flag) lives in
# model.sampling.* so it travels with the model checkpoint.
rollout:
  n: 4
  rollout_batch_size: 4
  noise_level: 1.0
  sample_batch_size: 1

  # Stochastic SDE sampling window (0 = SDE all steps; >0 = SDE only inside window).
  sde:
    type: sde
    window_size: 0
    window_range: [0, 10]

  same_latent: false            # share noise across group (debug only)
