# Wan 2.1 1.3B T2V transformer — checkpoint + LoRA + compile only.
# Sampling defaults live separately in configs/sampling/wan_2_1_1_3b.yaml.
model:
  family: wan
  path: Wan-AI/Wan2.1-T2V-1.3B-Diffusers

  use_lora: true
  lora:
    rank: 32
    alpha: 64
    path: ""
    target_modules:
      - add_k_proj
      - add_q_proj
      - add_v_proj
      - to_add_out
      - to_k
      - to_out.0
      - to_q
      - to_v

  torch_compile:
    enable: true
    mode: default              # 'default' | 'reduce-overhead' | 'max-autotune'
