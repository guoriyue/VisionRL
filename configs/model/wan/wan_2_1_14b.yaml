# Wan 2.1 14B T2V transformer.
model:
  family: wan
  path: Wan-AI/Wan2.1-T2V-14B-Diffusers

  use_lora: true
  lora:
    rank: 128
    alpha: 64
    path: ""
    target_modules:
      - add_k_proj
      - add_q_proj
      - add_v_proj
      - to_add_out
      - to_k
      - to_out.0
      - to_q
      - to_v

  torch_compile:
    enable: true
    mode: default
