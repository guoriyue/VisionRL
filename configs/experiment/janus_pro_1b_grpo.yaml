# Janus-Pro-1B GRPO — autoregressive image RL with PickScore + Aesthetic mix.
defaults:
  - /base/algorithm/token_grpo
  - /base/actor
  - /base/rollout/ar_discrete
  - /base/distributed/ray_rollout_single_gpu
  - /base/trainer
  - /model/janus_pro/1b
  - /sampling/janus_384_576tok

algorithm:
  init_kl_coef: 0.04

reward:
  components:
    pickscore: 1.0
    aesthetic: 0.1
  kwargs:
    pickscore:
      processor_name: laion/CLIP-ViT-H-14-laion2B-s32B-b79K
      model_name: yuvalkirstain/PickScore_v1
    aesthetic:
      model_name: openai/clip-vit-large-patch14

data:
  manifest: datasets/janus/prompts.txt

trainer:
  entrypoint: vrl.scripts.janus_pro.train:train_janus_pro_grpo
  output_dir: outputs/janus_pro_1b_grpo
