services:
  wm-serve:
    build: .
    ports:
      - "8400:8400"
    volumes:
      - ./models:/models:ro
    environment:
      - WM_DEVICE=cuda
      - WM_MODEL_PATH=/models/weights.pt
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
